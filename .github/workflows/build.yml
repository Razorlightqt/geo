name: Build geo
on:
  workflow_dispatch:
  schedule:
    - cron: '20 3 * * *'
  push:
    branches:
      - master
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "LICENSE"
      - "release/**"

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      CURL: "curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused"
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout v2fly/domain-list-community (geosite compiler + canonical data)
        uses: actions/checkout@v4
        with:
          repository: v2fly/domain-list-community
          path: community
          fetch-depth: 1

      - name: Checkout hydraponique/roscomvpn-geosite (overlay data)
        uses: actions/checkout@v4
        with:
          repository: hydraponique/roscomvpn-geosite
          path: roscomvpn-geosite
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: community/go.mod
          cache: true
          cache-dependency-path: community/go.sum

      # ---------- geosite ----------
      - name: Build merged geosite.dat
        run: |
          set -euo pipefail

          # roscomvpn data files have NO include: directives (verified) -> safe to
          # rename to roscomvpn-<name> and drop alongside the full v2fly data set.
          # Category code in the .dat = uppercased filename, so geosite:roscomvpn-<name>
          # becomes addressable while canonical v2fly categories keep their names.
          count=0
          for f in roscomvpn-geosite/data/*; do
            name=$(basename "$f")
            cp "$f" "community/data/roscomvpn-${name}"
            count=$((count+1))
          done
          echo "Overlaid $count roscomvpn categories (prefixed roscomvpn-)"

          # ---------- max-detection (INFRA-110): VPN / IP-probe detect domains ----------
          # Latest release of fatyzzz/max-list (regenerated regularly) — two plain newline-
          # separated domain lists (release ASSETS, not raw master). Merge+dedup into a v2fly
          # data file community/data/max-detection: a bare line = suffix match (gstatic.com
          # catches www.gstatic.com). Compiler emits category MAX-DETECTION (uppercased
          # filename) -> addressable as geosite:max-detection, picked up by both the .dat
          # (slim, it's in used-tags.txt) and the full .srs set (community/data/* loop).
          # Fetch failure ABORTS the build (set -e + curl -f) — last-good release stays served
          # (build-decoupled-from-serve). gstatic.com here does NOT affect burstObservatory:
          # its probes bypass routing via DialTaggedOutbound (verified, INFRA-110).
          MAXL=/tmp/max-list && mkdir -p "$MAXL"
          for a in ip-check-formatted.txt vpndetect.txt; do
            $CURL -o "$MAXL/$a" "https://github.com/fatyzzz/max-list/releases/latest/download/$a"
          done
          cat "$MAXL"/ip-check-formatted.txt "$MAXL"/vpndetect.txt \
            | tr -d '\r' | tr 'A-Z' 'a-z' | sed 's/[[:space:]]//g' \
            | grep -E '^[a-z0-9.-]+\.[a-z]{2,}$' \
            | sort -u > community/data/max-detection
          mc=$(grep -c . community/data/max-detection || true)
          echo "max-detection: ${mc} domains"; cat community/data/max-detection
          # Floor guard: a healthy fetch yields ~15 domains; <5 means truncated/garbage fetch.
          [ "$mc" -ge 5 ] || { echo "ERROR: max-detection only ${mc} domains — fetch likely broken"; exit 1; }

          mkdir -p /tmp/out
          pushd community >/dev/null
          go run ./ -outputdir=/tmp/out
          popd >/dev/null

          test -s /tmp/out/dlc.dat
          # Full geosite.dat is TRANSIENT (/tmp) — never published. Slim it to the used-tag
          # allowlist (INFRA-109, Variant B): only categories referenced by the 3 client
          # profiles ship in the client .dat. The .srs below stay FULL (built from exportlists,
          # independent of this file). filtergeosite fails the build if any used geosite tag is
          # absent from the compiled base (drift guard — catches typos / upstream renames).
          pushd tools/filtergeosite >/dev/null
          go mod tidy
          go run . /tmp/out/dlc.dat "$GITHUB_WORKSPACE/used-tags.txt" "$GITHUB_WORKSPACE/geosite.dat"
          popd >/dev/null

          test -s ./geosite.dat
          echo "geosite.dat full $(stat -c%s /tmp/out/dlc.dat) B -> slim $(stat -c%s ./geosite.dat) B"
          ls -l ./geosite.dat

      - name: Sanity check slim geosite.dat
        run: |
          set -euo pipefail
          # geosite.dat is now SLIM (used-tag allowlist). All anchors below are in the used set.
          # Category codes are plaintext uppercase strings inside the .dat.
          # MAX-DETECTION (INFRA-110) must survive slimming — it's in used-tags.txt and is the
          # dynamic fatyzzz/max-list category; its presence here proves it compiled + was kept.
          echo "== used categories present (sample) =="
          for c in GOOGLE NETFLIX CATEGORY-ADS DISCORD TWITTER ROSCOMVPN-CATEGORY-RU ROSCOMVPN-WHITELIST ROSCOMVPN-CATEGORY-GEOBLOCK-RU MAX-DETECTION; do
            if strings geosite.dat | grep -qx "$c"; then echo "  ok: $c"; else echo "  MISSING used anchor: $c"; exit 1; fi
          done
          # Slim proof: the full transient base is ~2.3 MB; slim must be well under it.
          # (Completeness of the used set is enforced inside filtergeosite — build fails on any
          #  missing used tag — so this only needs to confirm slimming actually happened.)
          sz=$(stat -c%s geosite.dat)
          echo "slim geosite.dat size: ${sz} B"
          [ "$sz" -lt 1500000 ] || { echo "ERROR: geosite.dat ${sz} B too large — slimming likely failed"; exit 1; }

      # ---------- geosite .srs (sing-box) ----------
      - name: Install sing-box (compile .srs, prod-compatible 1.13.13)
        run: |
          set -euo pipefail
          $CURL https://sing-box.app/install.sh | sudo -E sh -s -- --version 1.13.13
          sing-box version

      - name: Build geosite .srs (FULL set — all categories, includes resolved via exportlists)
        run: |
          set -euo pipefail
          # FULL coverage: every category present in community/data after the roscomvpn
          # overlay (canonical v2fly + roscomvpn-*). One .srs per geosite tag.
          SRS=$(for f in community/data/*; do [ -f "$f" ] && basename "$f"; done | sort -u | tr '\n' ' ')
          echo "geosite categories to compile: $(echo $SRS | wc -w)"
          list=$(echo $SRS | tr ' ' ',')

          # exportlists flattens include: into plaintext "<type>:<value>[:@attr]" per category.
          rm -rf /tmp/lists /tmp/srs && mkdir -p /tmp/lists /tmp/srs/geosite
          pushd community >/dev/null
          go run ./ -outputdir=/tmp/lists -exportlists="$list" >/dev/null
          popd >/dev/null

          n=0; skip=0
          for name in $SRS; do
            lc=$(echo "$name" | tr 'A-Z' 'a-z')
            txt="/tmp/lists/${lc}.txt"
            if [ ! -s "$txt" ]; then skip=$((skip+1)); continue; fi
            awk '{ i=index($0,":"); if(i==0) next; t=substr($0,1,i-1); r=substr($0,i+1); j=index(r,":@"); if(j>0) r=substr(r,1,j-1); if(r=="") next;
                   if(t=="domain") print "suffix\t" r; else if(t=="full") print "domain\t" r; else if(t=="keyword") print "keyword\t" r; else if(t=="regexp") print "regex\t" r }' "$txt" \
            | jq -Rn '
                def add($k; $v): .rules[0][$k] = ((.rules[0][$k] // []) + [$v]);
                reduce (inputs | split("\t")) as $it ({"version":3,"rules":[{}]};
                  if   $it[0]=="domain"  then add("domain";         $it[1])
                  elif $it[0]=="suffix"  then add("domain_suffix";  $it[1])
                  elif $it[0]=="keyword" then add("domain_keyword"; $it[1])
                  elif $it[0]=="regex"   then add("domain_regex";   $it[1])
                  else . end)
                | .rules[0] |= with_entries(select(.value | length > 0))
                | if (.rules[0] | length) == 0 then .rules = [] else . end
              ' > /tmp/j.json
            # skip categories that flatten to an empty rule-set (sing-box rejects those)
            if jq -e '(.rules | length) == 0' /tmp/j.json >/dev/null; then skip=$((skip+1)); continue; fi
            if ! sing-box rule-set compile --output "/tmp/srs/geosite/${name}.srs" /tmp/j.json 2>/dev/null; then
              rm -f "/tmp/srs/geosite/${name}.srs"; skip=$((skip+1)); continue
            fi
            n=$((n+1))
          done
          echo "compiled ${n} geosite .srs, skipped ${skip} (empty export)"
          # gate: roscomvpn-* and canonical anchors must exist
          test -s /tmp/srs/geosite/roscomvpn-category-ru.srs
          test -s /tmp/srs/geosite/discord.srs
          test -s /tmp/srs/geosite/google.srs

      # ---------- geoip ----------
      - name: Build merged geoip.dat
        run: |
          set -euo pipefail
          mkdir -p /tmp/geoip
          # General base: Loyalsoldier/geoip (MaxMind + dbip + curated; canonical codes RU/PRIVATE/CN/TELEGRAM/...).
          $CURL -o /tmp/geoip/general.dat https://github.com/Loyalsoldier/geoip/releases/latest/download/geoip.dat
          # Overlay: roscomvpn-geoip (RKN-tuned: DIRECT/WHITELIST/PRIVATE/...) -> prefixed ROSCOMVPN-.
          $CURL -o /tmp/geoip/roscom.dat https://github.com/hydraponique/roscomvpn-geoip/releases/latest/download/geoip.dat
          ls -l /tmp/geoip

          pushd tools/mergegeoip >/dev/null
          go mod tidy
          # USED_TAGS_FILE slims the PUBLISHED geoip.dat to the used-tag allowlist (INFRA-109).
          # GEOIP_SRS_DIR dump happens BEFORE the slim inside the tool, so node .srs stay FULL.
          # mergegeoip fails the build if any used geoip tag is absent from the merged set.
          IPV4_ONLY=1 GEOIP_SRS_DIR=/tmp/geoip-cidr USED_TAGS_FILE="$GITHUB_WORKSPACE/used-tags.txt" \
            go run . /tmp/geoip/general.dat /tmp/geoip/roscom.dat "ROSCOMVPN-" "$GITHUB_WORKSPACE/geoip.dat"
          popd >/dev/null

          test -s ./geoip.dat
          ls -l ./geoip.dat
          # jsDelivr refuses GitHub files > 20 MiB. Slim geoip.dat is ~50 KB — check kept as a
          # cheap floor/ceiling guard (also catches a full .dat accidentally shipping).
          sz=$(stat -c%s ./geoip.dat)
          echo "geoip.dat size: ${sz} bytes"
          if [ "$sz" -gt 20500000 ]; then
            echo "ERROR: geoip.dat ${sz} B exceeds jsDelivr 20 MiB limit (margin 20.5 MB)"; exit 1
          fi
          if [ "$sz" -gt 1000000 ]; then
            echo "ERROR: geoip.dat ${sz} B too large for a slim build — slimming likely failed"; exit 1
          fi

      - name: Sanity check slim geoip.dat
        run: |
          set -euo pipefail
          # geoip.dat is now SLIM — exactly the 10 used geoip codes (all canonical, no roscomvpn).
          echo "== used geoip present (all 10) =="
          for c in CLOUDFLARE CLOUDFRONT FACEBOOK FASTLY GOOGLE NETFLIX PRIVATE TELEGRAM TOR TWITTER; do
            if strings -n 2 geoip.dat | grep -qx "$c"; then echo "  ok: $c"; else echo "  MISSING used geoip: $c"; exit 1; fi
          done
          # Slim proof: non-used canonical codes (RU/CN) and the whole roscomvpn overlay must be ABSENT.
          for c in RU CN ROSCOMVPN-WHITELIST ROSCOMVPN-DIRECT ROSCOMVPN-PRIVATE; do
            if strings -n 2 geoip.dat | grep -qx "$c"; then echo "ERROR: non-used ${c} present in slim geoip.dat — slimming failed"; exit 1; fi
          done
          echo "slim geoip.dat OK (10 used codes, roscomvpn/RU/CN absent)"

      # ---------- geoip .srs (sing-box) ----------
      - name: Build geoip .srs (FULL set, IPv4)
        run: |
          set -euo pipefail
          # FULL coverage: one .srs per geoip category dumped by mergegeoip
          # (all canonical Loyalsoldier + ISO country codes + roscomvpn-*, IPv4-only).
          mkdir -p /tmp/srs/geoip
          n=0; skip=0
          for txt in /tmp/geoip-cidr/*.txt; do
            [ -e "$txt" ] || continue
            name=$(basename "$txt" .txt)
            if [ ! -s "$txt" ]; then skip=$((skip+1)); continue; fi
            jq -Rn '{version:3, rules:[{ip_cidr:[inputs | select(length>0)]}]}' < "$txt" > /tmp/jip.json
            if ! sing-box rule-set compile --output "/tmp/srs/geoip/${name}.srs" /tmp/jip.json 2>/dev/null; then
              rm -f "/tmp/srs/geoip/${name}.srs"; skip=$((skip+1)); continue
            fi
            n=$((n+1))
          done
          echo "compiled ${n} geoip .srs, skipped ${skip}"
          test -s /tmp/srs/geoip/ru.srs
          test -s /tmp/srs/geoip/roscomvpn-whitelist.srs

      # ---------- publish ----------
      - name: Set tag
        run: |
          DAILY_TAG=$(date +%Y%m%d%H%M)
          echo "DAILY_TAG=$DAILY_TAG" >> "$GITHUB_ENV"
          # Epoch stamp for the R.A.M. autorouting profile (routing.json). Client
          # re-pulls geo only when LastUpdated grows -> stamp every build.
          echo "LASTUPDATED=$(date +%s)" >> "$GITHUB_ENV"

      - name: Prepare release directory
        run: |
          set -euo pipefail
          rm -rf release
          mkdir -p release/sing-box
          cp ./geosite.dat release/
          cp ./geoip.dat release/
          cp -r /tmp/srs/geosite release/sing-box/geosite
          cp -r /tmp/srs/geoip   release/sing-box/geoip
          sha256sum release/geosite.dat > release/geosite.dat.sha256
          sha256sum release/geoip.dat  > release/geoip.dat.sha256

          # R.A.M. autorouting profile (plain JSON, NOT base64). Delivered to Happ/INCY
          # clients via the `autorouting` subscription header -> client self-updates geo.
          # Trimmed to geo carrier fields: Geoip/Geositeurl + LastUpdated (epoch stamp).
          # UseChunkFiles:"false" is mandatory — guards CutGeoData() from collapsing the
          # base to zero (rules live in the client xray-json body, not in this profile).
          REPO="${{ github.repository }}"
          # printf (no heredoc — indented heredoc delimiters don't terminate inside YAML run blocks)
          printf '{\n  "Name": "R.A.M.",\n  "UseChunkFiles": "false",\n  "Geoipurl": "https://cdn.jsdelivr.net/gh/%s@release/geoip.dat",\n  "Geositeurl": "https://cdn.jsdelivr.net/gh/%s@release/geosite.dat",\n  "LastUpdated": "%s"\n}\n' "$REPO" "$REPO" "$LASTUPDATED" > release/routing.json
          # fail loud if invalid JSON
          python3 -c "import json; json.load(open('release/routing.json')); print('routing.json OK')"
          cat release/routing.json

          echo "release: geosite .srs=$(find release/sing-box/geosite -name '*.srs' | wc -l), geoip .srs=$(find release/sing-box/geoip -name '*.srs' | wc -l)"
          ls -l release/

      - name: Push to release branch
        run: |
          set -euo pipefail
          cd release
          git init -q
          git config --local user.name "geo-bot"
          git config --local user.email "geo-bot@users.noreply.github.com"
          git checkout -q -b release
          git add -A
          git commit -q -m "Release ${DAILY_TAG}"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -q -u origin release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DAILY_TAG }}
          name: ${{ env.DAILY_TAG }}
          prerelease: false
          draft: false
          files: |
            release/geosite.dat
            release/geosite.dat.sha256
            release/geoip.dat
            release/geoip.dat.sha256

      - name: Purge jsDelivr CDN
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          # Purge EVERY published file (incl. sing-box .srs) — иначе jsDelivr держит
          # stale объект (поймано: geoip.dat >20 MiB версия отдавала 403 после ужатия).
          mapfile -t paths < <(cd release && find . -type f -not -path './.git/*' | sed "s|^\./|/gh/${REPO}@release/|" | sort)
          echo "files to purge: ${#paths[@]}"
          # Batch purge API (POST) — без per-file GET rate-limit; чанки по 50.
          purge_chunk() {
            local body
            body=$(printf '%s\n' "$@" | jq -R . | jq -sc '{path: .}')
            curl -fsSL --retry 3 --retry-delay 2 -X POST \
              -H 'content-type: application/json' -d "$body" \
              https://purge.jsdelivr.net/ | head -c 300 || true
            echo
          }
          chunk=()
          for p in "${paths[@]}"; do
            chunk+=("$p")
            if [ "${#chunk[@]}" -ge 50 ]; then purge_chunk "${chunk[@]}"; chunk=(); fi
          done
          [ "${#chunk[@]}" -gt 0 ] && purge_chunk "${chunk[@]}"
          # Verify .dat re-cache as 200 (ловит класс «stale 403 после ужатия»). Батч-POST
          # для крупного geoip обрабатывается асинхронно и медленно → внутри цикла
          # дополнительно дёргаем быстрый GET-purge до 200; до 10×6с.
          for f in geosite.dat geoip.dat routing.json; do
            ok=0
            for i in $(seq 1 10); do
              code=$(curl -s -o /dev/null -w '%{http_code}' "https://cdn.jsdelivr.net/gh/${REPO}@release/${f}" || echo 000)
              echo "verify ${f} (try ${i}): ${code}"
              if [ "$code" = "200" ]; then ok=1; break; fi
              curl -s -o /dev/null "https://purge.jsdelivr.net/gh/${REPO}@release/${f}" || true
              sleep 6
            done
            [ "$ok" = "1" ] || { echo "ERROR: ${f} not 200 on jsDelivr after purge"; exit 1; }
          done
