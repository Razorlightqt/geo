name: Build geo
on:
  workflow_dispatch:
  schedule:
    - cron: '20 3 * * *'
  push:
    branches:
      - master
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "LICENSE"
      - "release/**"

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      CURL: "curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused"
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout v2fly/domain-list-community (geosite compiler + canonical data)
        uses: actions/checkout@v4
        with:
          repository: v2fly/domain-list-community
          path: community
          fetch-depth: 1

      - name: Checkout hydraponique/roscomvpn-geosite (overlay data)
        uses: actions/checkout@v4
        with:
          repository: hydraponique/roscomvpn-geosite
          path: roscomvpn-geosite
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: community/go.mod
          cache: true
          cache-dependency-path: community/go.sum

      # ---------- geosite ----------
      - name: Build merged geosite.dat
        run: |
          set -euo pipefail

          # roscomvpn data files have NO include: directives (verified) -> safe to
          # rename to roscomvpn-<name> and drop alongside the full v2fly data set.
          # Category code in the .dat = uppercased filename, so geosite:roscomvpn-<name>
          # becomes addressable while canonical v2fly categories keep their names.
          count=0
          for f in roscomvpn-geosite/data/*; do
            name=$(basename "$f")
            cp "$f" "community/data/roscomvpn-${name}"
            count=$((count+1))
          done
          echo "Overlaid $count roscomvpn categories (prefixed roscomvpn-)"

          mkdir -p /tmp/out
          pushd community >/dev/null
          go run ./ -outputdir=/tmp/out
          popd >/dev/null

          test -s /tmp/out/dlc.dat
          cp -f /tmp/out/dlc.dat ./geosite.dat
          ls -l ./geosite.dat

      - name: Sanity check geosite namespaces
        run: |
          set -euo pipefail
          # Country codes are stored as plaintext uppercase strings inside the .dat.
          echo "== canonical v2fly categories (sample) =="
          for c in GOOGLE NETFLIX CATEGORY-ADS DISCORD TWITTER; do
            if strings geosite.dat | grep -qx "$c"; then echo "  ok: $c"; else echo "  MISSING: $c"; fi
          done
          echo "== roscomvpn-prefixed categories (sample) =="
          for c in ROSCOMVPN-CATEGORY-RU ROSCOMVPN-WHITELIST ROSCOMVPN-CATEGORY-GEOBLOCK-RU; do
            if strings geosite.dat | grep -qx "$c"; then echo "  ok: $c"; else echo "  MISSING: $c"; fi
          done
          # Hard gate: at least one canonical AND one roscomvpn category must exist.
          strings geosite.dat | grep -qx GOOGLE
          strings geosite.dat | grep -qx ROSCOMVPN-CATEGORY-RU
          echo "roscomvpn geosite category count: $(strings geosite.dat | grep -c '^ROSCOMVPN-' || true)"

      # ---------- geosite .srs (sing-box) ----------
      - name: Install sing-box (compile .srs, prod-compatible 1.13.13)
        run: |
          set -euo pipefail
          $CURL https://sing-box.app/install.sh | sudo -E sh -s -- --version 1.13.13
          sing-box version

      - name: Build geosite .srs (curated set, includes resolved via exportlists)
        run: |
          set -euo pipefail
          # Curated canonical services + all roscomvpn-* (overlay). NOT the full 1496
          # (would mean a huge release + jsDelivr purge rate-limit). Expand as needed.
          SRS="discord instagram twitter tiktok openai spotify reddit youtube google netflix telegram github steam whatsapp signal facebook meta cloudflare category-ads-all category-ru category-gov-ru"
          for f in roscomvpn-geosite/data/*; do SRS="$SRS roscomvpn-$(basename "$f")"; done
          list=$(echo $SRS | tr ' ' ',')

          # exportlists flattens include: into plaintext "<type>:<value>[:@attr]" per category.
          rm -rf /tmp/lists /tmp/srs && mkdir -p /tmp/lists /tmp/srs
          pushd community >/dev/null
          go run ./ -outputdir=/tmp/lists -exportlists="$list" >/dev/null
          popd >/dev/null

          n=0; skip=0
          for name in $SRS; do
            lc=$(echo "$name" | tr 'A-Z' 'a-z')
            txt="/tmp/lists/${lc}.txt"
            if [ ! -s "$txt" ]; then echo "  skip (no export): $name"; skip=$((skip+1)); continue; fi
            awk '{ i=index($0,":"); if(i==0) next; t=substr($0,1,i-1); r=substr($0,i+1); j=index(r,":@"); if(j>0) r=substr(r,1,j-1); if(r=="") next;
                   if(t=="domain") print "suffix\t" r; else if(t=="full") print "domain\t" r; else if(t=="keyword") print "keyword\t" r; else if(t=="regexp") print "regex\t" r }' "$txt" \
            | jq -Rn '
                def add($k; $v): .rules[0][$k] = ((.rules[0][$k] // []) + [$v]);
                reduce (inputs | split("\t")) as $it ({"version":3,"rules":[{}]};
                  if   $it[0]=="domain"  then add("domain";         $it[1])
                  elif $it[0]=="suffix"  then add("domain_suffix";  $it[1])
                  elif $it[0]=="keyword" then add("domain_keyword"; $it[1])
                  elif $it[0]=="regex"   then add("domain_regex";   $it[1])
                  else . end)
                | .rules[0] |= with_entries(select(.value | length > 0))
                | if (.rules[0] | length) == 0 then .rules = [] else . end
              ' > /tmp/j.json
            sing-box rule-set compile --output "/tmp/srs/${name}.srs" /tmp/j.json
            n=$((n+1))
          done
          echo "compiled ${n} geosite .srs, skipped ${skip}"
          ls -l /tmp/srs | head -30
          # gate: a roscomvpn-* and a canonical must exist
          test -s /tmp/srs/roscomvpn-category-ru.srs
          test -s /tmp/srs/discord.srs

      # ---------- geoip ----------
      - name: Build merged geoip.dat
        run: |
          set -euo pipefail
          mkdir -p /tmp/geoip
          # General base: Loyalsoldier/geoip (MaxMind + dbip + curated; canonical codes RU/PRIVATE/CN/TELEGRAM/...).
          $CURL -o /tmp/geoip/general.dat https://github.com/Loyalsoldier/geoip/releases/latest/download/geoip.dat
          # Overlay: roscomvpn-geoip (RKN-tuned: DIRECT/WHITELIST/PRIVATE/...) -> prefixed ROSCOMVPN-.
          $CURL -o /tmp/geoip/roscom.dat https://github.com/hydraponique/roscomvpn-geoip/releases/latest/download/geoip.dat
          ls -l /tmp/geoip

          pushd tools/mergegeoip >/dev/null
          go mod tidy
          IPV4_ONLY=1 go run . /tmp/geoip/general.dat /tmp/geoip/roscom.dat "ROSCOMVPN-" "$GITHUB_WORKSPACE/geoip.dat"
          popd >/dev/null

          test -s ./geoip.dat
          ls -l ./geoip.dat
          # jsDelivr refuses GitHub files > 20 MiB (20971520 B). Fail loud with margin.
          sz=$(stat -c%s ./geoip.dat)
          echo "geoip.dat size: ${sz} bytes"
          if [ "$sz" -gt 20500000 ]; then
            echo "ERROR: geoip.dat ${sz} B exceeds jsDelivr 20 MiB limit (margin 20.5 MB)"; exit 1
          fi

      - name: Sanity check geoip namespaces
        run: |
          set -euo pipefail
          echo "== canonical geoip (sample) =="
          for c in RU PRIVATE CN TELEGRAM CLOUDFLARE; do
            if strings -n 2 geoip.dat | grep -qx "$c"; then echo "  ok: $c"; else echo "  MISSING: $c"; fi
          done
          echo "== roscomvpn-prefixed geoip (sample) =="
          for c in ROSCOMVPN-WHITELIST ROSCOMVPN-DIRECT ROSCOMVPN-PRIVATE; do
            if strings -n 2 geoip.dat | grep -qx "$c"; then echo "  ok: $c"; else echo "  MISSING: $c"; fi
          done
          strings -n 2 geoip.dat | grep -qx RU
          strings -n 2 geoip.dat | grep -qx ROSCOMVPN-WHITELIST
          echo "roscomvpn geoip category count: $(strings -n 2 geoip.dat | grep -c '^ROSCOMVPN-' || true)"

      # ---------- publish ----------
      - name: Set tag
        run: |
          DAILY_TAG=$(date +%Y%m%d%H%M)
          echo "DAILY_TAG=$DAILY_TAG" >> "$GITHUB_ENV"

      - name: Prepare release directory
        run: |
          set -euo pipefail
          rm -rf release
          mkdir -p release/sing-box
          cp ./geosite.dat release/
          cp ./geoip.dat release/
          cp /tmp/srs/*.srs release/sing-box/
          sha256sum release/geosite.dat > release/geosite.dat.sha256
          sha256sum release/geoip.dat  > release/geoip.dat.sha256
          ls -l release/ release/sing-box/ | head -40

      - name: Push to release branch
        run: |
          set -euo pipefail
          cd release
          git init -q
          git config --local user.name "geo-bot"
          git config --local user.email "geo-bot@users.noreply.github.com"
          git checkout -q -b release
          git add -A
          git commit -q -m "Release ${DAILY_TAG}"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -q -u origin release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DAILY_TAG }}
          name: ${{ env.DAILY_TAG }}
          prerelease: false
          draft: false
          files: |
            release/geosite.dat
            release/geosite.dat.sha256
            release/geoip.dat
            release/geoip.dat.sha256

      - name: Purge jsDelivr CDN
        run: |
          set -euo pipefail
          for path in \
            "gh/${{ github.repository }}@release/geosite.dat" \
            "gh/${{ github.repository }}@release/geosite.dat.sha256" \
            "gh/${{ github.repository }}@release/geoip.dat" \
            "gh/${{ github.repository }}@release/geoip.dat.sha256" ; do
            $CURL -i "https://purge.jsdelivr.net/${path}" || true
          done
